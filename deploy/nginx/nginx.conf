events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       80;
        server_name  _;

        # ---- Security: block common sensitive-file probing ----
        # Return 444 (close connection, no response) to scanner bots
        location ~* \.(env|git|svn|hg|bzr|cvs|DS_Store|htpasswd|htaccess)$ {
            return 444;
        }
        location ~* \.(sql|log|bak|backup|old|orig|save|swp|tmp|copy|test)$ {
            return 444;
        }
        location ~* /\. {
            return 444;
        }

        # ---- SPA frontend static files + history-mode routing ----
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        # API reverse proxy to Spring Boot backend
        location /api {
            proxy_pass http://mmdp-backend:19021;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for large file uploads (up to 200MB per backend config)
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            client_max_body_size 200m;
        }
    }
}
